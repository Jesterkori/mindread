services:
  - type: web
    name: mindcheck
    runtime: python
    buildCommand: npm install && npm run build && node server/export_defaults.js && pip install -r server/requirements.txt
    startCommand: cd server && python startup.py && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mindcheck-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: RECAPTCHA_SECRET
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false

databases:
  - name: mindcheck-db
    databaseName: mindcheck
    user: mindcheck
    plan: free
